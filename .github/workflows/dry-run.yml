name: Google Ranking Dry Run

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: google-ranking-dry-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run full dry-run flow
        run: npm run dry-run

      - name: Run env-driven dry-run check
        run: node index.js
        env:
          DRY_RUN: 'true'