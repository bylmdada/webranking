name: Google Ranking Automation

on:
  schedule:
    - cron: '30 */8 * * *' # Every 8 hours at :30
  workflow_dispatch: {} # Allow manual trigger

permissions:
  contents: read

concurrency:
  group: google-ranking
  cancel-in-progress: false

jobs:
  visit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run visit module
        run: node index.js --visit-only
        env:
          SIMULATION_PROFILE: ci

  search:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run search module
        run: node index.js --search-only
        env:
          SIMULATION_PROFILE: ci

  indexing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run indexing module
        run: node index.js --indexing-only
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

  indexnow:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run IndexNow module
        run: node index.js --indexnow-only
        env:
          INDEXNOW_API_KEY: ${{ secrets.INDEXNOW_API_KEY }}
